          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-988-Replay-Indicator'
        serviceTicketURL:
# added v0.2 
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-978-Service-Ticket-URL'

      required:
        - transactionID
        - transactionTimestamp
        - publicationID
        - initialCorrelationID
        - replayIndicator
        - serviceTicketURL
          


 # parameters below set by the Sender in response to an initial message 
    R0:
      description: Response Block
      type: object
      additionalProperties:
          false        
      properties:
        responseCode:
            $ref:  'DataCatalogue-unresolved.yaml#/components/schemas/DI-979-Response-Code' 
