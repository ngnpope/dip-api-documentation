# Common blocks

    S1:
      description: Sender Common block
      type: object
      additionalProperties:
          false        
      properties:
        environmentTag:
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-991-Environment-Tag'
        subText:
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-977-SubText'
        senderUniqueReference : 
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-995-Sender-Unique-Reference'
        senderTimestamp :
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-998-Sender-Timestamp'
        senderDIPID :
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-997-Participant-Sender-DIPID'
        senderRoleID : 
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-984-Sender-Role-ID'
        senderCorrelationID:
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-985-Sender-Correlation-ID'  
        DIPConnectionProviderID:
          $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-996-DIP-Connection-Provider-DIPID'

      required: 
        - environmentTag
        - subText
        - senderUniqueReference
        - senderTimestamp  # DIN-448
        - senderDIPID
        - senderCorrelationID
        - DIPConnectionProviderID
        - senderRoleID  # DIN-448


    D0:
      description: DIP Block
      type: object
      additionalProperties:
          false        
      properties:           
        transactionID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-014-DIPTransactionID'
        transactionTimestamp:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
