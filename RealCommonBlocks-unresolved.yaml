          type: array
          items:
            $ref: 'DataCatalogue-unresolved.yaml#/components/schemas/DI-980-Status-Error-Messages'

      required:
        - responseCode
        - responseMessages


    A0:
      description: Addressing block
      type : object
      additionalProperties:
          false        
      properties:
        primaryRecipients:
          description: Primary Recipient - array of Ids; set by Sender
          type : array
          items: 
            $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006N-DIPParticipantID'
        secondaryRecipients:
          description: Secondary Recipient - array of Ids; set by DIP
          type : array
          items: 
            $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006N-DIPParticipantID'
        always:
          description: Always Recipient - array of Ids; set by DIP
          type : array
# DIN 722 changes below:
#          nullable: false
          items: 
#            anyOf:
#              - $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-009N-DIPParticipantRole'
              $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006N-DIPParticipantID'
      required:
        - primaryRecipients
        - secondaryRecipients
        - always


