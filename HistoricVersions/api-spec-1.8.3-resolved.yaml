        - $ref: '#/components/parameters/MessageRecipientId'
        - $ref: '#/components/parameters/CommonSignatureHeader'
        - $ref: '#/components/parameters/CommonSignatureDateHeader'
        - $ref: '#/components/parameters/CommonSHA256Header'
        - $ref: '#/components/parameters/CommonSignatureCertifcateHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookConfig'
      callbacks:
        outEvent:
          '{$request.body#/config.callbackURL}':
            post:
              parameters:
                - $ref: '#/components/parameters/CommonSignatureHeader'
                - $ref: '#/components/parameters/CommonSignatureDateHeader'
                - $ref: '#/components/parameters/CommonSHA256Header'
                - $ref: '#/components/parameters/CommonSignatureCertifcateHeader'
                - $ref: '#/components/parameters/CommonMPODetails'
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/DIPMessageEgressArray'
              responses:
                '201':
                  description: Messages Created
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/StandardResponse'
                '207':
                  description: Some Messages Created
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/StandardResponse'
                '400':
                  description: Bad Request
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/StandardResponse'
                '401':
                  description: Unauthorised Error
                '403':
                  description: Forbidden
                '404':
                  description: Not found
                '405':
                  description: Method Not Allowed
                '406':
                  description: Not Acceptable
                '408':
                  description: Request Timeout
                '413':
                  description: Payload Too Large
                '429':
                  description: Too Many Requests
                '500':
                  description: Internal Server Error
                '502':
                  description: Bad Gateway
                '503':
                  description: Service Unavailable
                '504':
                  description: Gateway Timeout
                '505':
                  description: HTTP Version Not Supported
      responses:
        '201':
          description: Publication configured
        '400':
          description: Bad Request
        '401':
          description: Unauthorised Error
        '403':
          description: Forbidden
    delete:
      summary: Delete existing Publication configuration
      description: Delete an exisiting webhook for PUB-001 publication
      tags:
