openapi: 3.0.0
info:
  version: 1.8.3
  title: DIP - Send Messages & Receive Publications
  description: Latest release 1.8.3 <br> DIP APIs for sending & recieving MHHS TOM messages and reports. <br>Supported interfaces -<br><br> -           Channel-001    Notification of Change of Supplier **<br> -           Channel-002    Registration Update to Supplier (COS Gain) **<br> -           Channel-003    Notification of Migration and De-Appointment (Migration)<br> -           Channel-004    Comms Hub Information <br> -           Channel-005    Metering Service MTD Updates to Registration<br> -           Channel-006    Registration Service Notification of MTD Updates<br> -           Channel-007    Change of Energisation Status Outcome<br> -           Channel-008    Registration Service Notification of Change of Energisation Status<br> -           Channel-009    Registration Service Notification of Disconnection<br> -           Channel-013    MDS Defaults Applied <br> -           Channel-014    Rejected Consumption Data Submission<br> -           Channel-015    Request Historic Consumption Replay (ADV Sites only)<br> -           Channel-016    HH Consumption History Replay  (ADV Sites only)<br> -           Channel-018    Notification of Registration Data Item Changes<br> -           Channel-019    Maintain MPAN Relationships<br> -           Channel-020    Maintain MPAN Relationship Response<br> -           Channel-021    UTC Settlement Period Consumption Data<br> -           Channel-022    LSS Period Data<br> -           Channel-023    LSS Totals Data<br> -           Channel-024    Supplier Advisory Notification to DS<br> -           Channel-025    Supplier Updates to Registration<br> -           Channel-026    Registration Service Notification of Supplier Data Chg<br> -           Channel-027    Consumption Amendment Request<br> -           Channel-028    Consumption Amendment Request Response<br> -           Channel-030    Correlated MPAN Activity<br> -           Channel-031    Supplier Service Provider Appointment Request<br> -           Channel-032    Supplier Service Provider Appointment Request Response<br> -           Channel-033    Registration Service Request for Service Appointment<br> -           Channel-034    Service Provider Appointment Request Response<br> -           Channel-035    Registration Service Appointment Status Notification<br> -           Channel-036    Registration Service Notification of Service Appointment & Supporting Info<br> -           Channel-037    Registration Service Notification of Service De-Appointment<br> -           Channel-038    Customer Direct Contract Advisory<br> -           Channel-039    Customer Direct Contract Advisory Response<br> -           Channel-040    Notification of ECS Annual Consumption<br> -           Channel-041    Cumulative Meter Reading<br> -           Channel-042    Customer Name Information<br> -           Channel-043    Registration Service Notification of Change of Connection Type<br> -           Channel-044    Registration Service Notification of Change of Segment<br> -           Channel-045    Registration Service Notification of Invalid Segment or No Agents Appointed<br> -           Channel-047    Notification of the Publication of a Downloadable Asset<br> -           Channel-050    EES Exclusive Updates<br><br> **New for IR7 - CR023 MDR Reports**<br><br> -           Channel-061    MDR Start Request<br> -           Channel-062    MDR Start Request Response<br> -           Channel-063    MDR Stop Request<br> -           Channel-064    MDR Provide Consumption<br> -           Channel-065    MDR Request/Provide Meter Reading<br> <br> **ECS Reports**<br><br> -           REP-002   LDSO report for DUoS (LDSO) – aggregated data **<br> -           REP-002A  Embedded Network report for DUoS – aggregated data<br> -           REP-002B  LDSO report for DUoS (Supplier)– aggregated data<br> -           REP-003   BM Unit Allocated Demand Volumes to Market Participants<br> -           REP-003A  Aggregated BM Unit Allocated Demand Volumes to Market Participants<br> -           REP-004   Supplier Deemed Take Report<br> -           REP-006   Aggregated Uncorrected volumes by CCC to Market Participants<br> -           REP-007   VAS Exception Report to Suppliers and BSCCo<br> -           REP-008   MDS Exception Report to LDSOs<br> -           REP-009   EMRS Report for Suppliers<br><br> New reports introduced for e-billing of site-specific DUoS <br><br> -           REP-900   LDSO E-bill Distribution Invoice I<br> -           REP-901   LDSO E-bill Distribution Invoice II<br> <br> New for IR7.2 - DIP Message Validation APIs - see DIP Message Validation Endpoints Section below <br><br> ** examples available in post /dip-channel/{id}<br> any comments please relay to design@mhhsprogramme.co.uk
servers: null
security:
  - ApiKeyAuth: []
paths:
  /dip-channel/{id}:
    summary: DIP Interface Channels
    description: Represents a single DIP messaging channel. Each interface/publication/report is identified by a 'id'
    post:
      summary: Submit a series of Interface messages
      description: Allows a Market Participant to submit a series of messages on a DIP interface
      operationId: sendMessage
      tags:
        - DIP Message Channel
      parameters:
        - $ref: '#/components/parameters/MessageChannel'
        - $ref: '#/components/parameters/CommonSignatureHeader'
        - $ref: '#/components/parameters/CommonSignatureDateHeader'
        - $ref: '#/components/parameters/CommonSHA256Header'
        - $ref: '#/components/parameters/CommonSignatureCertifcateHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DIPMessageArray'
            examples:
              IF-001-InitialRegistration:
                $ref: '#/components/examples/IF-001-InitialRegistration'
              IF-001-ChangeOfSupplier:
                $ref: '#/components/examples/IF-001-ChangeOfSupplier'
              IF-002:
                $ref: '#/components/examples/IF-002'
              IF-003-MSDeAppRM:
                $ref: '#/components/examples/IF-003-MSDeAppRM'
              IF-021:
                $ref: '#/components/examples/IF-021'
              IF-037-MSDeApp:
                $ref: '#/components/examples/IF-037-MSDeApp'
              IF-043:
                $ref: '#/components/examples/IF-043'
              IF-044:
                $ref: '#/components/examples/IF-044'
              REP-002:
                $ref: '#/components/examples/REP-002'
      responses:
        '201':
          description: Messages created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                messageArray:
                  - transactionID: T-IF-021-1401234567-SDS-20220321-1234CC0123456789
                    senderUniqueReference: S-IF-021-1401234567-SUP-20220321-12345687a1234567a
                    correlationID: null
                    sentTimestamp: '2022-03-21T11:15:59+00:00'
                    senderID: '00000000000'
                    recipientID: '1401234567'
                    DIPConnectionProviderID: null
                    message: MSG0000
                    help: null
                    serviceTicketURL: not yet implemented
                  - transactionID: T-IF-021-1401234567-SDS-20220321-1234CC0123456780
                    senderUniqueReference: S-IF-021-1401234567-SUP-20220321-12345687a1234567b
                    correlationID: null
                    sentTimestamp: '2022-03-21T11:15:59+00:00'
                    senderID: '00000000000'
                    recipientID: '1401234567'
                    DIPConnectionProviderID: null
                    message: MSG0000
                    help: null
                    serviceTicketURL: not yet implemented
                timestamp: '2022-03-21T11:16:01+00:00'
        '207':
          description: Some messages created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                messageArray:
                  - transactionID: T-IF-005-1223456789-MSS-20220401-1234CC0123456789
                    senderUniqueReference: S-IF-005-1223456789-MSS-20220401-12345687a1234567a
                    correlationID: CI-20220401-1234567890123abce123092
                    sentTimestamp: '2022-04-01T19:05:00+00:00'
                    senderID: '00000000000'
                    recipientID: '1223456789'
                    DIPConnectionProviderID: null
                    message: MSG0000
                    help: null
                    serviceTicketURL: not yet implemented
                  - transactionID: T-IF-005-1223456789-MSS-20220401-1234CC012345678a
                    senderUniqueReference: S-IF-005-1223456789-MSS-20220401-12345687a1234567b
                    correlationID: null
                    sentTimestamp: '2022-04-01T19:05:00+00:00'
                    senderID: '00000000000'
                    recipientID: '1223456789'
                    DIPConnectionProviderID: null
                    message: MSG1000 - Message failed
                    help: null
                    serviceTicketURL: not yet implemented
                timestamp: '2022-04-01T19:05:01+00:00'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                messageArray:
                  - transactionID: null
                    senderUniqueReference: null
                    correlationID: null
                    sentTimestamp: '2022-04-01T19:05:00+00:00'
                    senderID: '00000000000'
                    recipientID: '1123456789'
                    DIPConnectionProviderID: null
                    message: MSG1001 -Schema Failure
                    help: null
                    serviceTicketURL: not yet implemented
                timestamp: '2022-04-01T19:05:01+00:00'
        '401':
          description: Unauthorised Error
        '403':
          description: Forbidden
        '404':
          description: Not found
        '405':
          description: Method Not Allowed
        '406':
          description: Not Acceptable
        '408':
          description: Request Timeout
        '413':
          description: Payload Too Large
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
        '502':
          description: Bad Gateway
        '503':
          description: Service Unavailable
        '504':
          description: Gateway Timeout
        '505':
          description: HTTP Version Not Supported
  /dip-channel/{id}/pubconfig/{recipient-id}:
    post:
      summary: Configure DIP Channel Publication
      description: Allows a Market Participant to configure the output channel
      operationId: configurePublication
      tags:
