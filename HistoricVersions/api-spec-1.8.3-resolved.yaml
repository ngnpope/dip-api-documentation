components:
  parameters:
    MessageChannel:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/DT-000-InterfaceID'
    MessageRecipientId:
      name: recipient-id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/DT-006-DIPParticipantID'
    CommonSignatureHeader:
      name: X-DIP-Signature
      schema:
        type: string
      in: header
      required: true
    CommonSignatureDateHeader:
      name: X-DIP-Signature-Date
      schema:
        type: string
      in: header
      required: true
    CommonSHA256Header:
      name: X-DIP-Content-Hash
      schema:
        type: string
      in: header
      required: true
    CommonSignatureCertifcateHeader:
      name: X-DIP-Signature-Certificate
      schema:
        type: string
      in: header
      required: true
    CommonMPODetails:
      name: X-DIP-MPO
      schema:
        type: string
      in: header
      required: false
  securitySchemes:
    ApiKeyAuth:
      name: X-API-Key
      type: apiKey
      in: header
  schemas:
    DIPMessageArray:
      description: Array of DIP messages
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/DIPMessage'
    DIPMessageEgressArray:
