  /validate/IF-001/InitialRegistration:
    summary: DIP Interface Validation for IF-001
    description: Validates DIP messages. Need to specify message channel IF-001 and the event code InitialRegistration
    post:
      summary: Submit IF-001 with Event Code InitialRegistration message for validation
      description: Allows a Market Participant to validate a single messages for debugging purposes only
      operationId: validate-IF-001-InitialRegistration
      tags:
        - DIP Message Validation Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  payload:
                    $ref: '#/components/schemas/IF-001-InitialRegistration'
      responses:
        '201':
          description: Message OK
