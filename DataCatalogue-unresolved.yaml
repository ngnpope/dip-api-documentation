    DI-074-Subsidiary-MPAN:
        # 
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-002-MPAN'
   
    DI-075-Primary-MPAN:
        # The primary in a related MPAN relationship.  The primary is associated with the base load settlement configuration (contains no value, if not part of related MPAN pair).
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-002N-MPAN'
   
    DI-076-Estimation-Reason-Code:
        description : Used inconjunction with Settlement Period Quality Indicator to explain why data has been estimated
        type : string 
        nullable: true
        minLength : 1 # DIN-1024
        maxLength : 2
        example : '1' 
        enum:
          - '1' # OptOut
          - '2' # Missing 
          - '3' # Invalid 
          - '4' # CommsFault
          - '5' # LTV
          - '6' # Disabled
          - '7' # De-Energised 
          - '8' # Disconnected 
          - '9' # Consumption Amendment
          - '10' # NonSmart
#          - null # - DIN-476 - change for nullable enum
   
