openapi: 3.0.0

#######################
# Optional info section
#######################
info:
  title: MHHS Data Catalogue
  description: Common components for MHHS Message/Event objects
  version: 2.1.0

components:

  ####################
  # Common data models
  ####################
  schemas:

# Data type
    DI-000-Interface-ID:
        # Reference identifing which interface a message is perporting to use.
      $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-000-InterfaceID'

    DI-001-Address-Line-1:
      # A component of a metering point site address.
      # Recommended to be Free Text, but not un-common for the entire address to be entered into the first value.
      $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
        
    DI-002-Address-Line-2:
        # Recommended to be Sub-building Name / Number
      $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-003-Address-Line-3:
        # Recommended to be Building Name / Number
      $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-004-Address-Line-4:
        # Recommended to be Dependent Thoroughfare
      $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-005-Address-Line-5:
        # Recommended to be Thoroughfare
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-006-Address-Line-6:
        # Recommended to be Double Dependent Locality
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-007-Address-Line-7:
        # Recommended to be Dependent Locality
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-008-Address-Line-8:
        # Recommended to be Locality / Post Town
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-009-Address-Line-9:
        # Recommended to be County
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-001N-AddressLine'
    DI-010-Metering-Point-Postcode:
        # The full postcode of the metering point site.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-007N-UKPostCode'
  
    DI-013-Change-of-Segment-Indicator-Effective-From-Date:
        # The date-time on which the change of segment process was initiated by the supplier with the registration system
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        
    DI-015-Connection-Type-Indicator:
        description : A code to indicate the type of connection.
        type : string
        minLength : 1
        maxLength : 1
        example : W
        enum:
            - W # Whole Current
            - L # LV with CT
            - H # HV with CT
            - E # EHV with CT
            - U # Unmetered
            
    DI-016-Connection-Type-Indicator-Effective-From-Date:
        # The date and time from which the Connection Type is in effect.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
    
    DI-017-Consent-Granularity:
        description : Describes the granularity of energy settlement data that a customer has deemed to have consented to.
        type : string
        example : H
        enum:
            - H # HH Consent Granted
            - D # Daily Reads Only
            - M # Monthly Reads Only
            - N # No Consent # DIN-829
            - x # obfuscated value #DIN-858
            #- null # DIN-729 need to add null  
            
    DI-018-Consent-Granularity-Effective-From-Date:
        # The date from which the consent granularity was in effect.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        # DIN-689 update to not nullable 
        
    DI-019-Contract-Reference-Metering-Service:
        description : The unique reference of the contractual agreement between a supplier and the data service. 
        type : string
        nullable: true
        minLength : 1  # DIN-1024
        maxLength : 50  
        example : MTR-123-123
        
    DI-020-Contract-Reference-Data-Service:
        description : The unique reference of the contractual agreement between a supplier and the metering service. 
        type : string
        nullable: true
        minLength : 1  # DIN-1024
        maxLength : 50  
        example : SDS-123-123
        
    DI-021-Customer-Direct-Contract-Metering-Service:
        description : An indicator to show if a direct customer contract exists between the customer at the metering service provider.
        type : boolean
        example : true
        

        
    DI-022-Customer-Direct-Contract-Data-Service:
        description : An indicator to show if a direct customer contract exists between the customer at the data service provider.
        type : boolean
        example : true
        
        
    DI-023-Data-Service-Effective-From-Date:
        # The date and time from when a data service will be responsible for a metering point. Initially assumed to be midnight UTC.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        # updated DIN-689
        
    DI-024-Data-Service-ID:
        # The market-wide reference for the data service, responsible for processing the consumption data for a metering point. 
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006-DIPParticipantID'
        
    
    DI-025-DCC-Service-Flag:
        description : A flag indicating the status of services being provided by the DCC for the metering point.
        type : string
        maxLength : 1
        example : A
        enum:
            - A # Active
            - I # Installed 
            - N # Non-Active

    DI-026-DCC-Effective-From-Date:
        # The inclusive calendar date from which the DCC service flag applies.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
    
    DI-027-Disconnection-Effective-From-Date:
        # The date on which the connection point is physically removed from the metering system.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
    
    #DI028 added via DIN-788
    DI-028-Reconnection-Effective-From-Date:
        # The date on which the connection point is physically reconnected to from the metering system.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'    
    
    DI-029-Distributor-ID:
        description : The market-wide unique reference for the distributor who is responsible for the distribution network that a metering point is connected to.
        type : string
        maxLength : 4
        example : SWAL
    
    DI-030-Domestic-Premise-Indicator:
        description : A flag that indicates if the MPAN of the registration appointment is used to identify a domestic premises.
        type : boolean
        example : true

#DIN-1072
    DI-031-Load-Shape-Domestic-Premise-Indicator:
        description : The Domestic Premises Indicator associated with the Load Shape  
        type : string
        maxLength : 1
        minLength : 1
        nullable: true
        enum:
            - T # True
            - F # False
        example : T

    
    DI-032-Domestic-Premise-Indicator-Effective-From-Date:
        # The date from which the metering point Domestic Premise Indicator is in effect.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
   
    DI-033-Energisation-Status:
        description : Indicates if the metering point is considered energised (i.e. connected to the distribution system) and therefore active for settlement purposes.
        type : string
        minLength : 1
        maxLength : 1
        example : D
        enum:
            - D # De-Energised
            - E # Energised
            - U # Undefined # DIN-1047
   
    DI-034-Energisation-Status-Effective-From-Date:
        # The settlement date and time from which an energisation status is in effect for a metering system.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'

    DI-035-Energy-Direction:
        description : Indicates the direction of energy at a metering point. Values can be I = import / E = export 
        type : string
        minLength : 1
        maxLength : 1
        example : I
        enum:
            - I # Import
            - E # Export

    DI-036-GSP-Group-Effective-From-Date:
        # The date and time from which the GSP Group ID is in effect for the metering system. 
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        
    DI-037-GSP-Group-ID:
        description : Identifies the distinct grid supply point group (physical region of the country) where the metering point is located.
        type : string
        minLength : 2
        maxLength : 2
        example : _K
        enum:
          - _A
          - _B
          - _C
          - _D
          - _E
          - _F
          - _G
          - _H
          - _J
          - _K 
          - _L 
          - _M
          - _N
          - _P

    DI-038-Linked-ImportExport-MPAN:
        # When this metering point is part of an import/export pair, this identifies the related import or export metering point. Where more than one import MPAN exists, this shall be populated with the Primary Import MPAN. 
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-002-MPAN'
   
    DI-039-Load-Shape-GSP-Group-ID:
        description : The GSP Group ID assoicated with the Load Shape 
        type : string
        nullable: true
        minLength : 2
        maxLength : 2
        example : _K
        enum:
        - _A
        - _B
        - _C
        - _D
        - _E
        - _F
        - _G
        - _H
        - _J
        - _K 
        - _L 
        - _M
        - _N
        - _P
#        - null  # - DIN-476 - change for nullable enum
          
#    DI-040-Line-Loss-Factor-Class-Effective-From-Date:
        # The data and time that a line loss factor took effect for a distribution network.
#       $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
   
    DI-040-Annual-Load-Shape-Total:
        # The data and time that a line loss factor took effect for a distribution network.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016-Decimal-9-3'

   
    DI-041-Load-Shape-7-Day-Rolling-Off-Peak-Total:
        # description : The sum of the average Load Shape Off-Peak Total for the past 7 settlement dates.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016N-Decimal-9-3'

   
    DI-042-Load-Shape-7-Day-Rolling-Peak-Total:
        # description : The sum of the average Load Shape Peak Total for the past 7 settlement dates.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016N-Decimal-9-3'
   
    DI-043-Load-Shape-7-Day-Rolling-Total:
        # description : The sum of the average Load Shape Total for the past 7 settlement dates.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016-Decimal-9-3'
        
    DI-044-Load-Shape-Day-Off-Peak-Total:
        # description : The sum of Period Values for settlement periods (1 to 14) or (2 to 15).
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016N-Decimal-9-3'    

    DI-045-Load-Shape-Day-Peak-Total:
        # description : The sum of Period Values for settlement periods (15 to 48) or (1 and 16 to 48).
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016N-Decimal-9-3'        
        
    DI-046-Load-Shape-Day-Total:
        # description : The sum of all Period Values for the Settlement Date.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-016-Decimal-9-3'
        
    DI-047-Load-Shape-Total-Date:
        # The calendar date in UTC format, for the LSS record.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
   
    DI-048-Manufacturers-Make-And-Type: # DIN-864
        description : The Meter Manufacturer Make and Type
        type : string
        nullable: true
        minLength : 1 # DIN-1024
        maxLength : 60
        example : 'SIEMENS ZMD120AR44.0200.C4'
   
    DI-049-Market-Participant-Role-Code:
        description : Get description from DTC (was market service type)
        type : string
        maxLength : 1
        example : X
   
    DI-050-Market-Segment-Indicator:
        description : An enumeration of Smart/Advanced/Unmetered. 
        type : string
        minLength : 1 # DIN-1024
        maxLength : 1
        example : S
        enum:
            - U # Unmetered 
            - S  # Smart including Traditional
            - A # Advanced
   
    DI-051-Market-Segment-Indicator-Effective-From-Date:
        # The date from which the metering point Market Segment is in effect.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
   
    DI-052-Measurement-Quantity-ID:
        description : Identifies the type of the quantity that is measured by the Settlement Period Value.
        type : string
        minLength : 2
        maxLength : 2
        example : AI
        enum:
            - AI # Active Import
            - AE # Active Export
            - RI # Reactice Import
            - RE # Reactive Export
   
    DI-053-Meter-ID-Removed:
        #description : Meter ID of Removed Meter
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-029-MeterID'
   
   
    DI-054-Meter-Asset-Provider-Effective-From-Date:
        # The date and time from which the meter asset provider is in effect for a metering system.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
   
    DI-055-Meter-Asset-Provider-ID:
        description : The market-wide reference for the provider of the meter equipment.
        type : string
        minLength : 4
        maxLength : 4
        example : 'MAP1'
        
    DI-056-Meter-ID:
        #description : Serial number of the physical meter.
       $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-029-MeterID'
     
    DI-057-Meter-Installation-Date:
        # The date and time of installation for a meter at a metering point.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        
    DI-058-Meter-Removal-Date:
        # The date and time when a meter was removed from a metering point.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003N-DateTime'
        
    DI-059-Meter-Type:
        description : The type of meter, in relation to its capabilities. E.g. AMR.S1, S2, S2ADE 
        type : string
        maxLength : 5
        example : 'S2CDE'
     
        enum:
      #      - val   # Description
             - CHECK # Check
             - H     # Half Hourly
             - K     # Key
             - LAG_  # Lag
             - LEAD_ # Lead
             - MAIN_  # Main # DIN-866
             - N     # Non-Half Hourly
             - NCAMR # Non-remotely Configurable Automated Meter Reading
             - NSS   # A meter that meets the definition of an ADM but is not compliant with any version of SMETS
             - RCAMR # Remotely Configurable Automated Meter Reading without remote enable/disable capability
             - RCAMY # Remotely Configurable Automated Meter Reading with remote enable/disable capability
             - S     # Smartcard Prepayment
             - S1    # A meter that is compliant with the Smart Metering Equipment Technical Specifications 1 (SMETS1)
             - S2A   # A single element meter that is compliant with SMETS2
             - S2AD  # A single element meter with one or more ALCS that is compliant with SMETS2
             - S2ADE # Single element meter with one or more ALCS and Boost Function that is compliant with SMETS2
             - S2B   # twin element meter that is compliant with SMETS2
             - S2BD  # A twin element meter with one or more ALCS that is compliant with SMETS2
             - S2BDE # A twin element meter with one or more ALCS and Boost Function that is compliant with SMETS2
             - S2C   # A polyphase meter that is compliant with SMETS2
             - S2CD  # A polyphase meter with one or more ALCS that is compliant with SMETS2
             - S2CDE # A polyphase meter with one or more ALCS and Boost Function that is compliant with SMETS2
             - SPECL # Special
             - T     # Token
             - 2ADF  # Single Element with ALCS and Auxiliary Proportional Controller (APC) that is compliant with SMETS2
             - 2ADEF # Single Element with ALCS, Boost Function and APC that is compliant with SMETS2
             - 2AEF  # Single Element with Boost Function and APC that is compliant with SMETS2
             - 2AF   # Single Element with APC that is compliant with SMETS2
             - 2BF   # Twin Element with APC that is compliant with SMETS2
             - 2BDF  # Twin Element with ALCS and APC that is compliant with SMETS2
             - 2BDEF # Twin Element with ALCS, Boost Function and APC that is compliant with SMETS2
             - 2BEF  # Twin Element with Boost Function and APC that is compliant with SMETS2
             - 2CDEF # Polyphase with ALCS, Boost Function and APC that is compliant with SMETS2
             - 2CF   # Polyphase with APC that is compliant with SMETS2
             - 2CDF  # Polyphase with ALCS and APC that is compliant with SMETS2
             - 2CEF  # Polyphase with Boost Function and APC that is compliant with SMETS2

    DI-060-Modified-Meter-ID:
        #description : Updated/ Corrected Serial number of the physical meter - for use with IF-05 [MeterUpdate] and [MeterHistoryUpdate] Events.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-029N-MeterID'
        
    DI-061-Metering-Service-Effective-From-Date:
        # The date and time from when a metering service will be responsible for a metering point. Initially assumed to be midnight UTC.
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-003-DateTime'
        
#    DI-062-Metering-Service-ID:
