        - '19' # Call not made on routine visit
        - '20' # No access
        - '21' # Refused access
        - '22' # Meter blocked
        - '23' # Wiring dangerous or incomplete
        - '24' # Token Meter Reset
        - '25' # Token Meter Not Reset
        - '26' # Agent failed to keep appointment
