### DCR27/ADO73686
    DIPJournalRecord:
      type: object
      required:
        - SentDateTime
        - Interface
        - SenderUniqueReference
        - DIPTransactionID
        - MPANCore
        - JournalEntries
      properties:
        SentDateTime:
          type: string
          example: "2026-07-01 09:58:08"
          description: >
            Date/time as emitted by the Message Tracker source system.
            CONFIRMED: not tied to DT-003-DateTime — modelled as a generic
            string rather than a formatted/validated date-time.
        Interface:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-000-InterfaceID'
        SenderUniqueReference:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-995-SenderUniqueReference'
        DIPTransactionID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-014-DIPTransactionID'
        DIPCorrelationID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-011N-CorrelationID'
          example: "CI-BP09-20220401-1234567890123"
          description: >
            Correlation ID generated by the DIP (DI-987-DIP-Correlation-ID),
            sourced from the D0 block. Nullable per catalogue — CONFIRMED:
            the Message Tracker stores only the D0-block correlation ID,
            governed by the "Correlation ID Created?" (Yes/No/Copy) rule.
            When that rule evaluates to No, the D0 block correlation ID is
            null, and null is the correct representation here (not empty
            string "").
        MPANCore:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-002-MPAN'
        JournalEntries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/JournalEntry'

    JournalEntry:
      type: object
      required:
        - TimeGenerated
        - SenderDIPID
        - Interface
        - EventCode
        - SentDateTime
        - Duration
        - MessageDelayInMilliSeconds
        - SenderUniqueReference
        - DIPTransactionID
        - MPANCore
        - DIPStage
        - Status
        - StatusCode
        - rn
      properties:
        TimeGenerated:
          type: string
          example: "2026-07-01 09:58:08.692"
          description: >
            Date/time with millisecond precision, as emitted by the
            Message Tracker source system. CONFIRMED: generic string,
            not tied to DT-003-DateTime.
        SenderDIPID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006-DIPParticipantID'
        Interface:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-000-InterfaceID'
        EventCode:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-004N-EventCode'
        Reason:
          type: string
          nullable: true
          description: Populated for failure/rejection events; null on success.
        SentDateTime:
          type: string
          example: "2026-07-01 09:58:08.897"
          description: >
            Date/time as emitted by the Message Tracker source system.
            CONFIRMED: generic string, not tied to DT-003-DateTime.
        Duration:
          type: integer
          format: int32
          description: Processing duration in milliseconds.
        MessageDelayInMilliSeconds:
          type: integer
          format: int32
        SenderUniqueReference:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-995N-SenderUniqueReference'
        DIPTransactionID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-014N-DIPTransactionID'
        DIPCorrelationID:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-011N-CorrelationID'
          example: "CI-BP09-20220401-1234567890123"
          description: >
            Correlation ID generated by the DIP, sourced from the D0 block
            (DI-987-DIP-Correlation-ID). Null when "Correlation ID Created?"
            evaluates to No — confirmed as correct behaviour.
        MPANCore:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-002N-MPAN'
        DIPStage:
          type: string
          enum:
            - Inbound
            - MPANUpdateQueue
            - Addressing
            - Outbound
            - StatusMessage
          description: >
            Processing stage within the DIP pipeline. StatusMessage added
            per confirmed stage-to-status mapping below (delivery-status
            callback stage, distinct from Outbound itself).
        Status:
          $ref: '#/components/schemas/DIPStatusValue'
          description: >
            Status value for this journal entry. Uses a shared enum
            (DIPStatusValue) across all DIPStage values for consistency,
            per review feedback — NOT every value in the shared enum is
            valid for every stage. Confirmed allowed values per stage:

            * Inbound: GoodToGo, InternalServerError, InboundRuleFailure, Exception
            * Addressing: SentToTopic, Exception, Failed
            * MPANUpdateQueue: OK, Exception
            * Outbound: Delivered, DeliveryFailure, RejectedByRecipient,
              Retrying, UnknownDeliveryStatus, RetriesExhausted, Exception, Paused
            * StatusMessage: Delivered, DeliveryFailure, Retrying,
              UnknownDeliveryStatus, Paused

            NOTE: OpenAPI 3.0.x cannot express a conditional constraint
            ("if DIPStage=X then Status must be one of Y") on sibling
            properties within a single schema — the shared enum below
            is the closest single-schema representation. Enforcing the
            per-stage subset would require either (a) migrating to
            OpenAPI 3.1 and using if/then/else, or (b) modelling
            JournalEntry as a oneOf/discriminator keyed on DIPStage,
            each variant with its own Status enum. Flagging as a design
            decision rather than making it unilaterally — let me know
            which approach you want and I'll restructure accordingly.
        StatusCode:
          type: integer
          format: int32
          description: >
            HTTP response status code. Confirmed as-is; no catalogue DT match.
        Message:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-005N-StatusErrorMessage'
        Recipient:
          $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006N-DIPParticipantID'
          description: Single resolved recipient DIP ID; populated at Outbound stage.
        Recipients:
          type: array
          nullable: true
          items:
            $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006N-DIPParticipantID'
          description: >
            List of recipient DIP IDs. Source system currently emits this as
            a comma-separated string; modelled as an array here to remove
            consumer-side parsing.
        RecipientMap:
          type: object
          nullable: true
          description: >
            Structured routing map, keyed by delivery priority tier. Source
            system emits this as a delimited string
            (e.g. "Primary:[SUP:2300000185];Secondary:[LDSO:2500000033];Always:[MDS:1800000001]").
            UPDATED per review feedback: each tier is now an array of
            objects carrying an explicit role sub-node (e.g. SUP, LDSO, MDS)
            alongside the recipient DIP ID, rather than a flattened string.
          properties:
            Primary:
              type: array
              items:
                $ref: '#/components/schemas/RecipientMapEntry'
            Secondary:
              type: array
              items:
                $ref: '#/components/schemas/RecipientMapEntry'
            Always:
              type: array
              items:
                $ref: '#/components/schemas/RecipientMapEntry'
        uri:
          type: string
          format: uri
          nullable: true
          description: Delivery endpoint URI; populated only at Outbound stage.
        rn:
          type: integer
          format: int32
          description: >
            Row/sequence number within the journal. Confirmed as-is; no
            catalogue DT match.

    DIPStatusValue:
      type: string
      description: >
        Shared status enum across all DIPStage values, introduced per
        review feedback for consistency. See JournalEntry.Status for the
        confirmed stage-to-status subset mapping; this enum is the union
        of all stage-specific values and does not itself enforce which
        subset applies to a given DIPStage.
      enum:
        - GoodToGo
        - InternalServerError
        - InboundRuleFailure
        - Exception
        - SentToTopic
        - Failed
        - OK
        - Delivered
        - DeliveryFailure
        - RejectedByRecipient
        - Retrying
        - UnknownDeliveryStatus
        - RetriesExhausted
        - Paused

    RecipientMapEntry:
      type: object
      description: >
        A single recipient entry within a RecipientMap tier (Primary,
        Secondary, or Always), carrying both the recipient's role and
        DIP ID explicitly.
      required:
        - role
        - dipId
      properties:
        role:
          type: string
          description: >
            Role code for this recipient (e.g. SUP, LDSO, MDS). Sourced
            from the bracketed prefix in the current delimited-string
            format — confirm the full set of allowable role codes.
          example: "SUP"
