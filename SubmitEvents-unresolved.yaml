#####################                
components:

  parameters:

    MessageChannel:
      name: id
      in: path
      required: true 
      schema:
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-000-InterfaceID' 

    MessageRecipientId:
      name: recipient-id
      in: path
      required: true 
      schema:
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-006-DIPParticipantID' 

    RequeueId:
      name: requeue-id
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/RequeueId'

    ContinuationToken:
      name: X-Continuation-Token
      in: header
      required: false
      schema:
        type: string

    MessageId:
      name: message-id
      in: path
      required: true 
      schema:
        $ref: 'DataTypes-unresolved.yaml#/components/schemas/DT-995-SenderUniqueReference' 

              
    CommonSignatureHeader:
      name: X-DIP-Signature
      schema:
        type: string
      in: header
      required: true

    CommonSignatureDateHeader:
      name: X-DIP-Signature-Date
      schema:
        type: string
      in: header
      required: true

    CommonSHA256Header:
      name: X-DIP-Content-Hash
      schema:
        type: string
      in: header
      required: true

    CommonSignatureCertifcateHeader:
      name: X-DIP-Signature-Certificate
      schema:
        type: string
      in: header
      required: true
      
    CommonMPODetails:
      name: X-DIP-MPO
      schema:
        type: string
