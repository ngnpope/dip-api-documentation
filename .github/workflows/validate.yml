name: Validate YAML

on:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@2.34

      - name: Validate YAML resolves without errors
        run: |
          failed=0
          for f in *-unresolved.yaml; do
            if redocly bundle "$f" > /tmp/redocly_out.txt 2>&1; then
              echo "### ✅ $f" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              sed 's/\x1b\[[0-9;]*m//g' /tmp/redocly_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              failed=1
            fi
          done
          exit $failed

